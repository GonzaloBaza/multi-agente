<!DOCTYPE html>
<html>
<head><title>Audio Test</title></head>
<body style="background:#1a1a2e;color:white;padding:40px;font-family:sans-serif">
<h2>Test de Audio - MSK Latam</h2>

<h3>1. Audio WebM directo</h3>
<audio id="test1" controls preload="auto" style="width:400px;height:50px;display:block">
  <source src="/media/23e122e9b47e.webm" type="audio/webm">
  Tu navegador no soporta audio WebM.
</audio>
<p id="status1">Estado: cargando...</p>

<h3>2. Audio con JavaScript (Web Audio API)</h3>
<button onclick="playWithWebAudio()" style="padding:10px 20px;font-size:16px;cursor:pointer">Play con Web Audio API</button>
<p id="status2">Estado: esperando click...</p>

<h3>3. Audio con new Audio()</h3>
<button onclick="playWithNewAudio()" style="padding:10px 20px;font-size:16px;cursor:pointer">Play con new Audio()</button>
<p id="status3">Estado: esperando click...</p>

<h3>4. Diagnostico del archivo</h3>
<pre id="diag" style="background:#222;padding:15px;border-radius:8px;max-width:600px;overflow-x:auto">Cargando...</pre>

<script>
// Diagnostico
const audio1 = document.getElementById('test1');
const s1 = document.getElementById('status1');

audio1.addEventListener('loadedmetadata', () => {
  s1.textContent = `Estado: metadata cargada | Duracion: ${audio1.duration}s | readyState: ${audio1.readyState}`;
});
audio1.addEventListener('canplay', () => {
  s1.textContent += ' | canplay OK';
});
audio1.addEventListener('error', (e) => {
  const err = audio1.error;
  s1.textContent = `ERROR: code=${err?.code} message=${err?.message}`;
});
audio1.addEventListener('playing', () => {
  s1.textContent += ' | REPRODUCIENDO';
});
audio1.addEventListener('stalled', () => {
  s1.textContent += ' | STALLED';
});

// Check codec support
const diagEl = document.getElementById('diag');
const canPlay = {
  'audio/webm': audio1.canPlayType('audio/webm'),
  'audio/webm; codecs=opus': audio1.canPlayType('audio/webm; codecs=opus'),
  'audio/webm; codecs=vorbis': audio1.canPlayType('audio/webm; codecs=vorbis'),
  'audio/ogg': audio1.canPlayType('audio/ogg'),
  'audio/ogg; codecs=opus': audio1.canPlayType('audio/ogg; codecs=opus'),
  'audio/mp4': audio1.canPlayType('audio/mp4'),
  'audio/mpeg': audio1.canPlayType('audio/mpeg'),
};
diagEl.textContent = 'Soporte de codecs del navegador:\n' + JSON.stringify(canPlay, null, 2);

// Fetch file info
fetch('/media/23e122e9b47e.webm', {method: 'HEAD'}).then(r => {
  diagEl.textContent += '\n\nHEAD /media/23e122e9b47e.webm:';
  diagEl.textContent += '\n  Status: ' + r.status;
  diagEl.textContent += '\n  Content-Type: ' + r.headers.get('content-type');
  diagEl.textContent += '\n  Content-Length: ' + r.headers.get('content-length');
  diagEl.textContent += '\n  Accept-Ranges: ' + r.headers.get('accept-ranges');
}).catch(e => {
  diagEl.textContent += '\n\nHEAD error: ' + e.message;
});

// Web Audio API
async function playWithWebAudio() {
  const s2 = document.getElementById('status2');
  try {
    s2.textContent = 'Descargando archivo...';
    const resp = await fetch('/media/23e122e9b47e.webm');
    const buf = await resp.arrayBuffer();
    s2.textContent = `Descargado: ${buf.byteLength} bytes. Decodificando...`;

    const ctx = new AudioContext();
    const decoded = await ctx.decodeAudioData(buf);
    s2.textContent = `Decodificado: ${decoded.duration}s, ${decoded.numberOfChannels}ch, ${decoded.sampleRate}Hz. Reproduciendo...`;

    const source = ctx.createBufferSource();
    source.buffer = decoded;
    source.connect(ctx.destination);
    source.start();
    s2.textContent += ' REPRODUCIENDO!';
    source.onended = () => { s2.textContent += ' (terminado)'; };
  } catch(e) {
    s2.textContent = 'ERROR: ' + e.message;
  }
}

// new Audio()
function playWithNewAudio() {
  const s3 = document.getElementById('status3');
  const a = new Audio('/media/23e122e9b47e.webm');
  a.addEventListener('canplay', () => { s3.textContent = 'canplay OK, reproduciendo...'; a.play(); });
  a.addEventListener('playing', () => { s3.textContent += ' REPRODUCIENDO!'; });
  a.addEventListener('error', () => { s3.textContent = 'ERROR: ' + (a.error?.message || a.error?.code); });
  a.load();
  s3.textContent = 'Cargando...';
}
</script>
</body>
</html>
