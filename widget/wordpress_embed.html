<!-- ══════════════════════════════════════════════════════════════
     WIDGET BÁSICO (Argentina, color corporativo)
     Reemplazá https://TU_DOMINIO con la URL de tu backend
     ═══════════════════════════════════════════════════════════ -->
<script
  src="https://TU_DOMINIO/widget.js"
  data-country="AR"
  data-title="Asesor de Cursos"
  data-color="#1a73e8"
  data-greeting="¡Hola! Soy tu asesor de cursos médicos. ¿En qué especialidad te querés capacitar?"
  defer
></script>
