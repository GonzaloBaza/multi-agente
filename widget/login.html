<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — MSK Latam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1020;
  --surface: #261e2e;
  --surface2: #322838;
  --border: rgba(255,100,150,0.12);
  --primary: #ff2d78;
  --primary-dark: #e0206a;
  --primary-glow: rgba(255,45,120,0.3);
  --green: #22c55e;
  --red: #ef4444;
  --text: #f0e8f4;
  --text2: #9a8ea8;
  --text3: #6b5a7a;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(255,45,120,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(156,39,176,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.04) 0%, transparent 50%);
  pointer-events: none;
}

.login-wrapper {
  width: 100%;
  max-width: 420px;
  padding: 24px;
  position: relative;
  z-index: 1;
}

.login-card {
  background: rgba(38,30,46,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 44px 40px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 80px rgba(255,45,120,0.05);
}

.login-logo {
  text-align: center;
  margin-bottom: 32px;
}

.login-logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, #9c27b0, #7b1fa2);
  border-radius: 50%;
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(156,39,176,0.35);
  letter-spacing: -0.5px;
}

.login-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.login-subtitle {
  font-size: 13px;
  color: var(--text2);
  margin-top: 6px;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 7px;
}

input[type="email"],
input[type="password"],
input[type="text"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid rgba(255,100,150,0.15);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

input[type="email"]:focus,
input[type="password"]:focus,
input[type="text"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,45,120,0.15);
}

input::placeholder { color: var(--text3); }

.password-wrap {
  position: relative;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  line-height: 1;
  transition: color 0.15s;
}
.password-toggle:hover { color: var(--text2); }

.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  color: #fca5a5;
  font-size: 13px;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.visible { display: block; }

.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #ff2d78, #ff4d93);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 700;
  padding: 13px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s, opacity 0.15s;
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 4px 20px rgba(255,45,120,0.3);
}

.btn-login:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(255,45,120,0.45); }
.btn-login:active:not(:disabled) { transform: scale(0.98); }
.btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.spinning .spinner { display: inline-block; }
.spinning .btn-text { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 12px;
  color: var(--text3);
}

.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.loading-overlay.hidden { display: none; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">msk</div>
      <div class="login-title">MSK Latam</div>
      <div class="login-subtitle">Ingresa tus credenciales para continuar</div>
    </div>

    <form id="loginForm" onsubmit="login(event)" autocomplete="on">
      <div class="error-msg" id="errorMsg"></div>

      <div class="form-group">
        <label for="email">Usuario</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@email.com"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Contrasena</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder=""
            autocomplete="current-password"
            required
          >
          <button type="button" class="password-toggle" onclick="togglePwd()" id="pwdToggle" title="Mostrar/ocultar">&#128065;</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-text">Iniciar sesion</span>
      </button>
    </form>

    <div class="login-footer">MSK Latam &copy; 2024</div>
  </div>
</div>

<script>
async function checkExistingSession() {
  const token = localStorage.getItem('msk_session');
  if (!token) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    return;
  }
  try {
    const resp = await fetch('/auth/me', { headers: { 'X-Session-Token': token } });
    if (resp.ok) {
      window.location.href = '/inbox-ui';
    } else {
      localStorage.removeItem('msk_session');
      localStorage.removeItem('msk_user');
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  } catch(e) {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

checkExistingSession();

function togglePwd() {
  const input = document.getElementById('password');
  const btn = document.getElementById('pwdToggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '&#128584;';
  } else {
    input.type = 'password';
    btn.innerHTML = '&#128065;';
  }
}

async function login(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('errorMsg');

  errorEl.classList.remove('visible');
  btn.disabled = true;
  btn.classList.add('spinning');

  try {
    const resp = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (resp.ok) {
      const data = await resp.json();
      localStorage.setItem('msk_session', data.token);
      localStorage.setItem('msk_user', JSON.stringify(data.user));
      window.location.href = '/inbox-ui';
    } else {
      const err = await resp.json().catch(() => ({}));
      errorEl.textContent = err.detail || 'Email o contrasena incorrectos';
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.classList.remove('spinning');
    }
  } catch(err) {
    errorEl.textContent = 'Error de conexion. Intenta nuevamente.';
    errorEl.classList.add('visible');
    btn.disabled = false;
    btn.classList.remove('spinning');
  }
}
</script>
</body>
</html>
