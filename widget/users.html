<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios — MSK Latam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1020;
  --surface: #261e2e;
  --surface2: #322838;
  --surface3: #3d2f48;
  --border: rgba(255,100,150,0.12);
  --primary: #ff2d78;
  --primary-dark: #e0206a;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --orange: #fb923c;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --text: #f0e8f4;
  --text2: #9a8ea8;
  --text3: #6b5a7a;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.header-logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
.header-sep { width: 1px; height: 20px; background: var(--border); }
.header-title { font-size: 14px; color: var(--text2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px 4px 8px;
  font-size: 12px; color: var(--text2);
}
.user-chip-name { font-weight: 600; color: var(--text); }
.role-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 4px; text-transform: uppercase; letter-spacing: 0.4px;
}
.role-admin { background: rgba(255,45,120,0.2); color: var(--primary); }
.role-supervisor { background: rgba(245,158,11,0.2); color: var(--yellow); }
.role-agente { background: rgba(148,163,184,0.15); color: var(--text2); }
.btn-logout {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--text2); font-size: 12px; padding: 5px 10px; cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Nav Rail ── */
.nav-rail {
  width: 64px; flex-shrink: 0;
  background: #150d1c;
  border-right: 1px solid rgba(255,100,150,0.08);
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0; gap: 4px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 8px; border-radius: 8px; cursor: pointer;
  text-decoration: none; color: #9098b8;
  transition: all 0.15s; width: 52px; text-align: center;
}
.nav-item:hover { background: #2a2e40; color: #e8eaf2; }
.nav-item.active { background: rgba(255,45,120,0.18); color: #ff2d78; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; }

/* ── Main content ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.page-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.page-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

/* ── New user form card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.card-title {
  font-size: 14px; font-weight: 700; margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.full { grid-column: 1 / -1; }

label {
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.4px;
}

input[type="text"], input[type="email"], input[type="password"],
select, .queue-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 13px;
  padding: 8px 11px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
input:focus, select:focus { border-color: var(--primary); }
input::placeholder { color: var(--text3); }

select option { background: var(--surface2); }

/* Queue checkboxes */
.queue-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
  max-height: 160px;
  overflow-y: auto;
  padding: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
}
.queue-grid::-webkit-scrollbar { width: 4px; }
.queue-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.queue-check {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; border-radius: 5px;
  cursor: pointer; font-size: 12px; color: var(--text2);
  transition: background 0.12s;
}
.queue-check:hover { background: var(--surface3); color: var(--text); }
.queue-check input[type="checkbox"] {
  width: 14px; height: 14px; cursor: pointer;
  accent-color: var(--primary);
  padding: 0;
  flex-shrink: 0;
}

.form-actions { display: flex; gap: 10px; margin-top: 18px; }

.btn {
  padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; gap: 6px;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }

/* ── Users table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.table-header {
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.table-title { font-size: 14px; font-weight: 700; }
.table-count { font-size: 12px; color: var(--text2); }

table {
  width: 100%;
  border-collapse: collapse;
}
th {
  background: var(--surface2);
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid rgba(46,50,73,0.5);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(42,46,64,0.4); }

.td-name { font-weight: 500; }
.td-email { color: var(--text2); }
.td-queues { display: flex; flex-wrap: wrap; gap: 4px; max-width: 320px; }
.queue-tag {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 4px; font-size: 10px; padding: 2px 6px; color: var(--text2);
}

/* Inline edit row */
.edit-row td { background: rgba(255,45,120,0.05); }
.edit-row td input, .edit-row td select {
  padding: 5px 8px; font-size: 12px;
}
.inline-queue-grid {
  display: flex; flex-wrap: wrap; gap: 4px;
  max-width: 320px;
}
.inline-queue-check {
  display: flex; align-items: center; gap: 3px;
  font-size: 11px; color: var(--text2); cursor: pointer;
}
.inline-queue-check input { width: 12px; height: 12px; accent-color: var(--primary); padding: 0; }

/* Loading/Empty */
.table-loading {
  padding: 40px; text-align: center; color: var(--text3); font-size: 13px;
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 18px;
  font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  transform: translateY(80px); opacity: 0;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(34,197,94,0.4); }
.toast.error { border-color: rgba(239,68,68,0.4); }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100">
  <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="header">
  <div class="header-logo">MSK</div>
  <div class="header-sep"></div>
  <div class="header-title">Gestión de Usuarios</div>
  <div class="header-right">
    <div class="user-chip">
      <span>👤</span>
      <span class="user-chip-name" id="headerUserName">—</span>
      <span class="role-badge role-admin" id="headerUserRole">admin</span>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</div>

<div class="layout">
  <nav class="nav-rail">
    <a href="/admin/dashboard-ui" class="nav-item" title="Panel">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Panel</span>
    </a>
    <a href="/inbox-ui" class="nav-item" title="Inbox">
      <span class="nav-icon">💬</span>
      <span class="nav-label">Inbox</span>
    </a>
    <a href="/admin/flows-ui" class="nav-item" title="Flujos">
      <span class="nav-icon">🔀</span>
      <span class="nav-label">Flujos</span>
    </a>
    <a href="/admin/prompts-ui" class="nav-item" title="Prompts">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">Prompts</span>
    </a>
    <a href="/admin/users-ui" class="nav-item active" title="Usuarios">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Usuarios</span>
    </a>
    <a href="/admin/templates-ui" class="nav-item" title="Templates">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Templates</span>
    </a>
    <a href="/admin/redis-ui" class="nav-item" title="Redis">
      <span class="nav-icon">🗄️</span>
      <span class="nav-label">Redis</span>
    </a>
  </nav>

  <div class="main">
    <div class="page-title">👥 Gestión de Usuarios</div>
    <div class="page-sub">Administrá los accesos al panel. Solo administradores pueden crear y modificar usuarios.</div>

    <!-- New user form -->
    <div class="card" id="newUserCard">
      <div class="card-title">➕ Nuevo usuario</div>

      <form id="newUserForm" onsubmit="createUser(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" id="nu-name" placeholder="Ej: María García" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="nu-email" placeholder="mail@msklatam.com" required>
          </div>
          <div class="form-group">
            <label>Contraseña temporal</label>
            <input type="password" id="nu-password" placeholder="Mínimo 8 caracteres" required minlength="8">
          </div>
          <div class="form-group">
            <label>Rol</label>
            <select id="nu-role">
              <option value="agente">Agente</option>
              <option value="supervisor">Supervisor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Colas asignadas</label>
            <div class="queue-grid" id="nu-queues"></div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="createBtn">
            ➕ Crear usuario
          </button>
          <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
        </div>
        <div id="createError" style="color:var(--red);font-size:12px;margin-top:10px;display:none"></div>
      </form>
    </div>

    <!-- Users table -->
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">Usuarios registrados</div>
        <div class="table-count" id="usersCount">Cargando…</div>
      </div>
      <div id="tableBody">
        <div class="table-loading">Cargando usuarios…</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SESSION_TOKEN = localStorage.getItem('msk_session');
let currentUser = null;
let editingId = null;

const ALL_QUEUES = [
  'ventas_AR','ventas_MX','ventas_CL','ventas_CO','ventas_EC','ventas_MP',
  'cobranzas_AR','cobranzas_MX','cobranzas_CL','cobranzas_CO','cobranzas_EC','cobranzas_MP',
  'post_venta_AR','post_venta_MX','post_venta_CL','post_venta_CO','post_venta_EC','post_venta_MP',
];

function authHeaders() {
  return { 'X-Session-Token': SESSION_TOKEN, 'Content-Type': 'application/json' };
}

function roleBadge(role) {
  const cls = { admin: 'role-admin', supervisor: 'role-supervisor', agente: 'role-agente' }[role] || 'role-agente';
  return `<span class="role-badge ${cls}">${role}</span>`;
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(t) {
  return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Auth guard ──
async function checkAuth() {
  if (!SESSION_TOKEN) { window.location.href = '/login'; return; }
  try {
    const resp = await fetch('/auth/me', { headers: { 'X-Session-Token': SESSION_TOKEN } });
    if (!resp.ok) { localStorage.removeItem('msk_session'); window.location.href = '/login'; return; }
    currentUser = await resp.json();
    if (currentUser.role !== 'admin') {
      document.getElementById('newUserCard').style.display = 'none';
    }
    document.getElementById('headerUserName').textContent = currentUser.name || currentUser.email;
    const roleEl = document.getElementById('headerUserRole');
    roleEl.textContent = currentUser.role;
    roleEl.className = `role-badge role-${currentUser.role}`;
    document.getElementById('loadingOverlay').style.display = 'none';
    buildQueueCheckboxes('nu-queues', []);
    loadUsers();
  } catch(e) {
    window.location.href = '/login';
  }
}

function buildQueueCheckboxes(containerId, selected, prefix = 'nu') {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = ALL_QUEUES.map(q => `
    <label class="queue-check">
      <input type="checkbox" name="${prefix}-q" value="${q}" ${selected.includes(q)?'checked':''}>
      ${q}
    </label>`).join('');
}

function getCheckedQueues(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return [];
  return [...el.querySelectorAll('input[type=checkbox]:checked')].map(i => i.value);
}

// ── Load users ──
async function loadUsers() {
  try {
    const resp = await fetch('/auth/users', { headers: authHeaders() });
    if (!resp.ok) throw new Error(await resp.text());
    const users = await resp.json();
    renderTable(users);
    document.getElementById('usersCount').textContent = `${users.length} usuario${users.length !== 1 ? 's' : ''}`;
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<div class="table-loading" style="color:var(--red)">Error al cargar usuarios: ${esc(e.message)}</div>`;
  }
}

function renderTable(users) {
  if (!users.length) {
    document.getElementById('tableBody').innerHTML = '<div class="table-loading">Sin usuarios registrados</div>';
    return;
  }

  const rows = users.map(u => {
    if (editingId === u.id) return renderEditRow(u);
    const queuesHtml = (u.queues || []).length
      ? u.queues.map(q => `<span class="queue-tag">${esc(q)}</span>`).join('')
      : '<span style="color:var(--text3);font-size:11px">Sin colas</span>';
    const isMe = currentUser && u.id === currentUser.id;
    return `
      <tr id="row-${u.id}">
        <td class="td-name">${esc(u.name || '—')} ${isMe ? '<span style="font-size:10px;color:var(--primary)">(tú)</span>' : ''}</td>
        <td class="td-email">${esc(u.email)}</td>
        <td>${roleBadge(u.role)}</td>
        <td><div class="td-queues">${queuesHtml}</div></td>
        <td>
          <div style="display:flex;gap:6px">
            ${currentUser && currentUser.role === 'admin' ? `
              <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px" onclick="startEdit('${u.id}')">✏️ Editar</button>
              ${!isMe ? `<button class="btn btn-danger" style="padding:5px 10px;font-size:11px" onclick="deleteUser('${u.id}','${esc(u.email)}')">🗑️</button>` : ''}
            ` : '—'}
          </div>
        </td>
      </tr>`;
  }).join('');

  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Colas</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderEditRow(u) {
  const queueChecks = ALL_QUEUES.map(q => `
    <label class="inline-queue-check">
      <input type="checkbox" value="${q}" ${(u.queues||[]).includes(q)?'checked':''} onchange="updateEditQueues('${u.id}')">
      <span>${q}</span>
    </label>`).join('');

  return `
    <tr class="edit-row" id="row-${u.id}">
      <td colspan="5">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 0">
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Nombre</label>
            <input type="text" id="edit-name-${u.id}" value="${esc(u.name||'')}" style="width:100%">
          </div>
          <div>
            <label style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Rol</label>
            <select id="edit-role-${u.id}">
              <option value="agente" ${u.role==='agente'?'selected':''}>Agente</option>
              <option value="supervisor" ${u.role==='supervisor'?'selected':''}>Supervisor</option>
              <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
            </select>
          </div>
          <div style="grid-column:1/-1">
            <label style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:6px">Colas</label>
            <div class="inline-queue-grid" id="edit-queues-${u.id}">${queueChecks}</div>
          </div>
          <div style="grid-column:1/-1;display:flex;gap:8px">
            <button class="btn btn-primary" style="font-size:12px;padding:6px 14px" onclick="saveEdit('${u.id}')">Guardar</button>
            <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="cancelEdit()">Cancelar</button>
          </div>
        </div>
      </td>
    </tr>`;
}

let _cachedUsers = [];

async function startEdit(id) {
  editingId = id;
  await loadUsers();
}

function cancelEdit() {
  editingId = null;
  loadUsers();
}

async function saveEdit(id) {
  const name = document.getElementById(`edit-name-${id}`).value.trim();
  const role = document.getElementById(`edit-role-${id}`).value;
  const queues = [...document.querySelectorAll(`#edit-queues-${id} input:checked`)].map(i => i.value);

  try {
    const resp = await fetch(`/auth/users/${id}`, {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify({ name, role, queues }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    editingId = null;
    showToast('Usuario actualizado');
    loadUsers();
  } catch(e) {
    showToast('Error al actualizar: ' + e.message, 'error');
  }
}

async function deleteUser(id, email) {
  if (!confirm(`¿Eliminar usuario ${email}? Esta acción no se puede deshacer.`)) return;
  try {
    const resp = await fetch(`/auth/users/${id}`, {
      method: 'DELETE',
      headers: authHeaders(),
    });
    if (!resp.ok) throw new Error(await resp.text());
    showToast(`Usuario ${email} eliminado`);
    loadUsers();
  } catch(e) {
    showToast('Error al eliminar: ' + e.message, 'error');
  }
}

// ── Create user ──
async function createUser(e) {
  e.preventDefault();
  const btn = document.getElementById('createBtn');
  const errEl = document.getElementById('createError');
  errEl.style.display = 'none';

  const payload = {
    name: document.getElementById('nu-name').value.trim(),
    email: document.getElementById('nu-email').value.trim(),
    password: document.getElementById('nu-password').value,
    role: document.getElementById('nu-role').value,
    queues: getCheckedQueues('nu-queues'),
  };

  btn.disabled = true;
  btn.textContent = 'Creando…';

  try {
    const resp = await fetch('/auth/users', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || await resp.text());
    }
    showToast(`Usuario ${payload.email} creado`);
    clearForm();
    loadUsers();
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '➕ Crear usuario';
  }
}

function clearForm() {
  document.getElementById('nu-name').value = '';
  document.getElementById('nu-email').value = '';
  document.getElementById('nu-password').value = '';
  document.getElementById('nu-role').value = 'agente';
  document.querySelectorAll('#nu-queues input[type=checkbox]').forEach(i => i.checked = false);
  document.getElementById('createError').style.display = 'none';
}

function logout() {
  fetch('/auth/logout', { method: 'POST', headers: authHeaders() });
  localStorage.removeItem('msk_session');
  localStorage.removeItem('msk_user');
  window.location.href = '/login';
}

checkAuth();
</script>
</body>
</html>
