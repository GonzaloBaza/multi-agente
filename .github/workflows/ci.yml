name: CI

# Corre en cada push a main y en cada PR. Bloquea el merge si algo falla.
#
# Lo que cubre:
#   - backend: ruff lint + pytest (smoke + unit) + pip-audit (CVEs)
#   - frontend: tsc --noEmit + next build + npm audit (CVEs high+)
#
# NO levanta servicios externos (Postgres, Redis, OpenAI). Los tests son
# puros — si necesitás integration tests con services, agregá un job
# separado con `services:` containers.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend · ruff
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: pytest
        env:
          OPENAI_API_KEY: sk-test-fake
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: ci-secret
          APP_ENV: test
        run: pytest tests/ -v

  backend-audit:
    name: Backend · pip-audit (CVEs)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pip-audit
      # Solo CVEs HIGH / CRITICAL bloquean el merge. MEDIUM / LOW salen como
      # warning (exit 0) — queremos visibilidad sin romper el CI por deps
      # transitivas con fixes menores.
      - run: pip-audit -r requirements.txt --strict --skip-editable || true
      - run: pip-audit -r requirements.txt --vulnerability-service osv

  frontend:
    name: Frontend · typecheck + build + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: npm audit (high+)
        # Solo bloquea en HIGH/CRITICAL. Moderate se reporta pero no falla
        # el CI (habitualmente son transitivas con fixes en roadmap).
        run: npm audit --audit-level=high
