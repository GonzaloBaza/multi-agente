name: CI

# Corre en cada push a main y en cada PR. Bloquea el merge si algo falla.
# Mínimo viable: que nada importe roto, las funciones puras pasen, y el
# build del frontend tipa/compila. NO levanta servicios externos (Postgres,
# Redis, OpenAI) — los tests son smoke + unit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: pytest
        # Vars fake para que `config.settings` no explote al instanciar.
        # No hay llamadas reales — son smoke tests de imports + unit tests
        # de funciones puras (circuit breaker, agent_queue_scope).
        env:
          OPENAI_API_KEY: sk-test-fake
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: ci-secret
          APP_ENV: test
        run: pytest tests/ -v

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        # `next build` ejecuta typecheck + lint + generación estática. Si
        # una página falla el pre-render, el CI lo captura antes del merge.
        run: npm run build
